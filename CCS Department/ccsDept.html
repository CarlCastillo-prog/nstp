<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCS Department | Campus Tech Assist</title>

    <!-- CSS -->
    <link rel="stylesheet" href="ccsDept.css" />

    <!-- ICON -->
    <link rel="icon" type="text/css" href="../Main Picture/mainPic.png" />

    <!-- Icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">
        <div href="../index.html" class="nav-logo">
          <img
            src="../Main Picture/mainPic.png"
            alt="logo"
            class="logo-image"
          />
        </div>
        <p>Campus Tech Assist</p>
      </div>

      <div class="section-title">Discover</div>

      <div class="menu">
        <a href="../index.html">
          <i class="fa-solid fa-house"></i>
          <span class="menu-label">Home</span>
        </a>
        <a
          class="active"
          href="../CCS Department/ccsDept.html"
          data-tooltip="CCS Department"
        >
          <i class="fa-solid fa-building"></i>
          <span class="menu-label">CCS Department</span>
        </a>
        <a href="../Guide Go/guideGo.html" data-tooltip="Guide Go">
          <i class="fa-solid fa-map-location-dot"></i>
          <span class="menu-label">Guide Go</span>
        </a>
        <a href="../Tech Tutorial/techTut.html" data-tooltip="Tech Tutorial">
          <i class="fa-solid fa-computer"></i>
          <span class="menu-label">Tech Tutorial</span>
        </a>
        <a
          href="../Lost and Found/lostnFound.html"
          data-tooltip="Lost and Found"
        >
          <i class="fa-solid fa-box-open"></i>
          <span class="menu-label">Lost and Found</span>
        </a>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
      <div class="header">
        <h2>CCS Department</h2>
      </div>

      <!-- CAROUSEL -->
      <div class="carousel-container">
        <button class="crsl-btn"><i class="fas fa-chevron-left"></i></button>

        <div class="carousel-track">
          <div
            class="carousel-slide"
            onclick="openUCModal('../CCS MV/ccsMission.png', 'CCS Mission')"
          >
            <div
              class="slide-avatar"
              style="background-image: url('../CCS MV/ccsMission.png')"
            ></div>
            <div class="slide-name">CCS Mission</div>
          </div>

          <div
            class="carousel-slide"
            onclick="openUCModal('../CCS MV/ccsVision.png', 'CCS Vision')"
          >
            <div
              class="slide-avatar"
              style="background-image: url('../CCS MV/ccsVision.png')"
            ></div>
            <div class="slide-name">CCS Vision</div>
          </div>

          <div
            class="carousel-slide"
            onclick="openUCModal('../CCS MV/ccsGoals.png', 'CCS Goals')"
          >
            <div
              class="slide-avatar"
              style="background-image: url('../CCS MV/ccsGoals.png')"
            ></div>
            <div class="slide-name">CCS Goals</div>
          </div>
        </div>

        <button class="crsl-btn2"><i class="fas fa-chevron-right"></i></button>

        <div class="carousel-indicators">
          <button class="indicator active"></button>
          <button class="indicator"></button>
          <button class="indicator"></button>
        </div>
      </div>

      <!-- UC Modal -->
      <div id="uc-modal" class="uc-modal">
        <div class="uc-modal-overlay"></div>
        <div class="uc-modal-content">
          <img id="uc-modal-img" src="" alt="" />
          <h3 id="uc-modal-title"></h3>
          <div class="uc-modal-footer">
            <button class="uc-modal-btn" onclick="prevUCModal()">
              <i class="fas fa-chevron-left"></i>
            </button>
            <button
              class="uc-modal-btn uc-modal-close"
              onclick="closeUCModal()"
            >
              <i class="fas fa-times"></i>
            </button>
            <button class="uc-modal-btn" onclick="nextUCModal()">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="../Home/searchIndex.js"></script>
    <script src="../Home/globalSearch.js"></script>
    <script src="../Search/searchIndex.js"></script>
    <script src="../Home Page/globalSearch.js"></script>
    <script src="../Home Page/globalSearch.css" rel="stylesheet"></script>
    <script src="../Home/script.js"></script>
    <script src="CCS.js"></script>
  </body>
</html>
